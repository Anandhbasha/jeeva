<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <nav class="sideBar">
        <a href="#">Home</a>
        <a href="#">Shorts</a>
        <a href="#">Subscription</a>
        <a href="#">History</a>
        <a href="#">Playlist</a>
        <a href="#">Watch Later</a>
        <a href="#">Liked Videos</a>
        <a href="#">Your Videos</a>
        <a href="#">Downloads</a>
        <a href="#">Shopping</a>
        <a href="#">Music</a>
    </nav>

    <!-- Main Content -->
    <div class="mainContent">

        <!-- Filter Buttons -->
        <div class="filterBtn">
            <button>All</button>
            <button>Music</button>
            <button>Mixes</button>
            <button>Hiphop</button>
            <button>Trailers</button>
            <button>News</button>
            <button>Scifi</button>
            <button>Album</button>
            <button>Live</button>
            <button>Web Development</button>
        </div>

        <!-- Videos -->
        <div class="videos">

            <!-- Repeat Video Card -->
            <div class="video">
                <div class="thumb"></div>
                <p>Sample Video Title</p>
            </div>

            <div class="video"><div class="thumb"></div><p>Sample Video</p></div>
            <div class="video"><div class="thumb"></div><p>Sample Video</p></div>
            <div class="video"><div class="thumb"></div><p>Sample Video</p></div>
            <div class="video"><div class="thumb"></div><p>Sample Video</p></div>
            <div class="video"><div class="thumb"></div><p>Sample Video</p></div>
            <div class="video"><div class="thumb"></div><p>Sample Video</p></div>
            <div class="video"><div class="thumb"></div><p>Sample Video</p></div>
            <div class="video"><div class="thumb"></div><p>Sample Video</p></div>
            <div class="video"><div class="thumb"></div><p>Sample Video</p></div>
            <div class="video"><div class="thumb"></div><p>Sample Video</p></div>

        </div>

    </div>
</div>

</body>
</html>
